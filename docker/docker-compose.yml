services:
  postgres:
    image: postgres:17

    container_name: datapilot_postgres

    restart: always

    environment:
      POSTGRES_DB: datapilot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: